spring:
  application:
    name: quickstart
  threads:
    virtual:
      enabled: true

  # Elasticsearch配置
  elasticsearch:
    # 连接地址（逗号分隔多个地址）
    uris: http://localhost:9200
    # 如果ES启用了安全认证，需要配置用户名和密码
    #username: elastic
    #password: your-password
    # 连接超时（默认：10s）
    #connection-timeout: 10s
    # 读取超时（默认：30s）
    #socket-timeout: 30s

  # Kafka配置
  kafka:
    listener:
      auto-startup: false
    bootstrap-servers: localhost:9092

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/testdb?characterEncoding=utf-8&useInformationSchema=true
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: leonardo123

  # Redis配置（外部中间件，可选）
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: leonardo123
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 3000ms

# ID 生成器配置
id:
  snowflake:
    datacenter-id: 0
    worker-id: 0

# 中间件配置
middleware:
  # Kafka消费者配置
  kafka:
    consumer:
      # Bootstrap服务器列表（默认：localhost:9092）
      bootstrap-servers: localhost:9092
      # 消费者组ID（默认：kafka-consumer-group）
      group-id: kafka-consumer-group
      # 信任的包名列表（用于JsonDeserializer反序列化，默认："*"）
      trusted-packages: "*"
      # 订阅的主题列表（默认：["domain-events"]）
      topics:
        - domain-events
      # 自动提交偏移量（默认：false，手动提交）
      enable-auto-commit: false
      # 自动偏移量重置策略（默认：earliest）
      auto-offset-reset: earliest
      # 最大轮询记录数（默认：500）
      max-poll-records: 500
      # 最大轮询间隔（毫秒，默认：300000）
      max-poll-interval-ms: 300000

  # 线程池配置
  thread-pool:
    # IO密集型线程池配置
    io:
      # 核心线程数（可选，默认使用CPU核心数动态计算）
      core-size: ${CPU_COUNT:8}
      # 最大线程数（可选，默认使用CPU核心数 * 2动态计算）
      max-size: ${CPU_COUNT_TIMES_2:16}
      # 队列容量（默认：1000）
      queue-capacity: 1000
      # 线程名称前缀（默认：io-task-）
      thread-name-prefix: io-task-
      # 拒绝策略（默认：CallerRunsPolicy）
      # 可选值：CallerRunsPolicy, AbortPolicy, DiscardPolicy, DiscardOldestPolicy
      rejection-policy: CallerRunsPolicy
    # CPU密集型线程池配置
    cpu:
      # 核心线程数（可选，默认使用CPU核心数动态计算）
      core-size: ${CPU_COUNT:8}
      # 最大线程数（可选，默认使用CPU核心数 + 1动态计算）
      max-size: ${CPU_COUNT_PLUS_1:9}
      # 队列容量（默认：100）
      queue-capacity: 100
      # 线程名称前缀（默认：cpu-task-）
      thread-name-prefix: cpu-task-
      # 拒绝策略（默认：AbortPolicy）
      rejection-policy: AbortPolicy
    # 守护线程池配置
    daemon:
      # 核心线程数（可选，默认使用CPU核心数 / 2动态计算）
      core-size: ${CPU_COUNT_HALF:4}
      # 最大线程数（可选，默认使用CPU核心数动态计算）
      max-size: ${CPU_COUNT:8}
      # 队列容量（默认：1000）
      queue-capacity: 1000
      # 线程名称前缀（默认：daemon-task-）
      thread-name-prefix: daemon-task-
      # 线程优先级（默认：1，即MIN_PRIORITY）
      thread-priority: 1
    # 任务调度线程池配置
    scheduler:
      # 线程池大小（可选，默认使用CPU核心数动态计算）
      pool-size: ${CPU_COUNT:8}
      # 线程名称前缀（默认：scheduled-task-）
      thread-name-prefix: scheduled-task-
      # 是否在取消任务时从队列中移除（默认：true）
      remove-on-cancel-policy: true
      # 等待任务完成的超时时间（秒，默认：60）
      await-termination-seconds: 60

  # 数据库配置
  database:
    # MyBatis日志实现类（默认：StdOutImpl）
    # 可选值：StdOutImpl, Slf4jImpl, NoLoggingImpl, Jdk14LoggingImpl, Log4j2Impl
    log-impl: StdOutImpl

  # 对象存储配置
  object-storage:
    # 基于依赖自动检测机制选择实现（通过 @ConditionalOnBean 注解自动切换）
    # - local: 默认实现（LocalOssServiceImpl），无需外部依赖
    # - rustfs: 检测到 RustFsOssClientImpl Bean 时启用（需先启动 RustFS 服务）
    # Spring Boot 自动配置会根据 Bean 存在情况自动选择实现

    # RustFS 配置（检测到 RustFsOssClientImpl Bean 时生效）
    # 基于 AWS S3 SDK v2 实现，RustFS 100% 兼容 S3 协议
    rustfs:
      # RustFS 服务器地址
      endpoint: http://localhost:9000
      # Access Key（默认值：leonardo123）
      access-key: leonardo123
      # Secret Key（默认值：leonardo123）
      secret-key: leonardo123
      # Bucket 名称（默认值：default）
      bucket: default
      # 连接超时（默认：5s）
      connect-timeout: 5s
      # 读取超时（默认：30s）
      read-timeout: 30s

    # 本地存储配置（作为默认实现）
    local:
      # 基础路径（可选）
      # 不指定则使用默认路径：用户文件夹/.project/${spring.application.name}/oss
      # 示例 Windows: C:\Users\${user.home}\.project\quickstart\oss
      # 示例 Linux/Mac: /home/${user.home}/.project/quickstart/oss
      base-path: ${user.home}/.project/${spring.application.name}/oss
      # 是否使用零拷贝技术（NIO transferTo/transferFrom）
      # - true: 使用零拷贝，性能更好（推荐）
      # - false: 使用传统拷贝方式
      zero-copy: true

  # 缓存配置
  cache:
    # 基于依赖自动检测机制选择实现（通过 @ConditionalOnBean 注解自动切换）
    # - local: 默认实现（LocalCacheServiceImpl），无需外部依赖
    # - redis: 检测到 RedisTemplate Bean 时启用（需先启动 Redis 服务）
    # Spring Data Redis 自动配置会根据 spring.data.redis 配置创建 RedisTemplate

    # Redis 配置（检测到 RedisTemplate Bean 时生效）
    # 详细的 Redis 连接配置见上方 spring.data.redis 部分
    redis:
      # 缓存键前缀（可选）
      key-prefix: "app:"
      # 默认过期时间（可选）
      default-ttl: 30m
      # 是否使用 null 值缓存（防止缓存穿透）
      cache-null-values: true

    # 本地缓存配置（作为默认实现）
    local:
      # 初始容量（默认：100）
      initial-capacity: 100
      # 最大容量（默认：1000）
      maximum-size: 1000
      # 写入后过期时间（默认：10m）
      expire-after-write: 10m
      # 访问后过期时间（默认：5m）
      expire-after-access: 5m

  # 事件发布配置
  event:
    publisher:
      # 基于依赖自动检测机制选择实现（通过 @ConditionalOnBean 注解自动切换）
      # - spring: 默认实现（SpringEventPublisherImpl），无需外部依赖
      # - kafka: 检测到 KafkaTemplate Bean 时启用（需先启动 Kafka 服务）
      # Spring Boot 自动配置会根据 spring.kafka 配置创建 KafkaTemplate

      # Kafka 配置（检测到 KafkaTemplate Bean 时生效）
      # 详细的 Kafka 配置见上方 spring.kafka 部分
      kafka:
        # 主题前缀（可选）
        topic-prefix: "domain-events-"
        # 是否启用发布确认
        enable-acks: true
        # 超时时间（默认：5s）
        timeout: 5s
        # 重试次数（默认：3）
        retries: 3

      # Spring Events 配置（作为默认实现）
      spring:
        # 是否异步处理（默认：true）
        async: true
        # 线程池核心大小（默认：5）
        thread-pool-core-size: 5
        # 线程池最大大小（默认：10）
        thread-pool-max-size: 10
        # 队列容量（默认：100）
        thread-pool-queue-capacity: 100

    # 事件消费配置（事件重试任务）
    retry:
      # Cron 表达式（默认：每分钟执行一次）
      cron: "0 * * * * ?"
      # 每批次处理数量（默认：100）
      batch-size: 100
      # 高优先级事件占比（默认：0.8，即80%）
      high-priority-ratio: 0.8
      # 重试延迟时间列表（分钟）
      delays:
        - 1   # 第1次重试：1分钟后
        - 5   # 第2次重试：5分钟后
        - 15  # 第3次重试：15分钟后
        - 30  # 第4次重试：30分钟后
        - 60  # 第5次重试：60分钟后
      # 最大重试次数（默认：5）
      max-retry-times: 5

  # 短信服务配置（可选）
  # 支持的服务类型：aliyun（阿里云）
  # 未配置 access-key-id 时，使用 Mock 实现（SmsServiceImpl）
  sms:
    # 服务类型（默认：aliyun）
    type: aliyun
    # 阿里云短信配置（type=aliyun 时生效）
    aliyun:
      # AccessKey ID（必填，启用阿里云服务时需要）
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:your-access-key-id}
      # AccessKey Secret（必填，启用阿里云服务时需要）
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:your-access-key-secret}
      # 区域ID（默认：cn-hangzhou）
      region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
      # 短信签名名称（在阿里云短信服务控制台申请）
      sign-name: ${ALIYUN_SMS_SIGN:你的签名}

  # 邮件服务配置（可选）
  # 支持的服务类型：aliyun（阿里云）
  # 未配置 access-key-id 时，使用 Mock 实现（EmailServiceImpl）
  email:
    # 服务类型（默认：aliyun）
    type: aliyun
    # 阿里云邮件配置（type=aliyun 时生效）
    aliyun:
      # AccessKey ID（必填，启用阿里云服务时需要）
      access-key-id: ${ALIYUN_EMAIL_ACCESS_KEY_ID:your-access-key-id}
      # AccessKey Secret（必填，启用阿里云服务时需要）
      access-key-secret: ${ALIYUN_EMAIL_ACCESS_KEY_SECRET:your-access-key-secret}
      # 区域ID（默认：cn-hangzhou）
      region-id: ${ALIYUN_EMAIL_REGION_ID:cn-hangzhou}
      # 发信地址（在阿里云邮件推送控制台配置的发信地址）
      from-address: ${ALIYUN_EMAIL_FROM:noreply@example.com}
      # 发信人别名（可选）
      from-alias: ${ALIYUN_EMAIL_ALIAS:系统通知}
      # 账户名称（通常与发信地址相同）
      account-name: ${ALIYUN_EMAIL_ACCOUNT:noreply@example.com}
      # 回信地址（可选）
      reply-to-address: ${ALIYUN_EMAIL_REPLYTO:}


server:
  port: 9102
  servlet:
    context-path: /${spring.application.name}

springdoc:
  show-actuator: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /openapi-doc.html

logging:
  config: classpath:logback-spring.xml
