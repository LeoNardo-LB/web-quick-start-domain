spring:
  application:
    name: quickstart
  threads:
    virtual:
      enabled: true

  # Kafka配置
  kafka:
    listener:
      auto-startup: false
    bootstrap-servers: localhost:9092

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/testdb?characterEncoding=utf-8&useInformationSchema=true
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: leonardo123

  # Redis配置（外部中间件，可选）
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: leonardo123
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 3000ms

# 事件重试配置
event:
  retry:
    cron: "0 * * * * ?"
    batchSize: 100
    highPriorityRatio: 0.8

# ID 生成器配置
id:
  snowflake:
    datacenter-id: 0
    worker-id: 0

# 对象存储配置
middleware:
  object-storage:
    # 存储类型：local | rustfs
    type: local
    # RustFS 配置
    rustfs:
      endpoint: http://localhost:9000
      access-key: leonardo123
      secret-key: leonardo123
      bucket: default
      connect-timeout: 5s
      read-timeout: 30s
    # 本地存储配置
    local:
      # 基础路径（可选，默认：用户文件夹/.project/${spring.application.name}/oss）
      base-path: ${user.home}/.project/${spring.application.name}/oss
      # 是否使用零拷贝（NIO transferTo/transferFrom）
      zero-copy: true

server:
  port: 9101
  servlet:
    context-path: /${spring.application.name}

springdoc:
  show-actuator: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /openapi-doc.html

logging:
  config: classpath:logback-spring.xml
