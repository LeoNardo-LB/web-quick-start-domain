spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;FILE_LOCK=NO
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always
      schema-locations: classpath:config/schema.sql

# DBUnit Configuration
dbunit:
  datatype-factory: com.github.springtestdbunit.datatype.MySqlDataTypeFactory
  escape-pattern: "`?`"
  case-sensitive-table-names: false
  isolation: METHOD