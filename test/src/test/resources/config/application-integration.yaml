spring:
  application:
    name: quickstart-integration-test

  # H2内存数据库配置（MySQL兼容模式）
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;FILE_LOCK=NO
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # SQL初始化配置 - 加载H2兼容的schema文件（仅测试环境）
  sql:
    init:
      mode: always
      schema-locations: classpath:config/schema.sql
      encoding: UTF-8

  # H2控制台（可选，调试时使用）
  h2:
    console:
      enabled: false

  # 禁用Kafka（测试环境不需要）
  kafka:
    listener:
      auto-startup: false

  # Redis配置（测试环境使用嵌入式或忽略）
  data:
    redis:
      host: localhost
      port: 6379
      database: 99
      timeout: 3000ms

# 中间件配置
middleware:
  # 使用本地缓存
  cache:
    type: local

  # 使用Spring事件发布器（测试环境推荐）
  event:
    publisher:
      type: spring
      spring:
        async: false  # 测试环境使用同步事件，便于验证
        thread-pool-core-size: 1
        thread-pool-max-size: 1
        thread-pool-queue-capacity: 10

  # 对象存储使用本地文件系统
  object-storage:
    type: local

  # 短信服务配置（测试环境禁用）
  sms:
    type: aliyun
    aliyun:
      access-key-id: your-access-key-id
      access-key-secret: your-access-key-secret

  # 邮件服务配置（测试环境禁用）
  email:
    type: aliyun
    aliyun:
      access-key-id: your-access-key-id
      access-key-secret: your-access-key-secret

# ID生成器配置
id:
  snowflake:
    datacenter-id: 0
    worker-id: 0

# 日志配置
logging:
  level:
    root: INFO
    org.smm.archetype: DEBUG
    org.springframework.test: INFO
    com.mybatisflex: DEBUG
    com.zaxxer.hikari: INFO
